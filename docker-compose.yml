services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alert
      POSTGRES_PASSWORD: alert
      POSTGRES_DB: alert
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alert"]
      interval: 5s
      timeout: 5s
      retries: 5

  alert-analyser:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://alert:alert@postgres:5432/alert
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MODEL: ${MODEL:-claude-sonnet-4-6}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
