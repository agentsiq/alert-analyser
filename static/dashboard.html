<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Dashboard — UAP</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    body { background: var(--bg); }
    .subnav { display: flex; background: var(--navy-1); border-bottom: 1px solid var(--border); padding: 0 40px; }
    .subnav__link { display: inline-flex; align-items: center; gap: 6px; padding: 13px 16px; font-size: .85rem; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; text-decoration: none; transition: color var(--t), border-color var(--t); }
    .subnav__link:hover { color: var(--text); }
    .subnav__link--active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .content { padding: 28px 40px; }
    .page-heading { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .page-heading__title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .page-heading__sub { font-size: .88rem; color: var(--text-muted); }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .kpi { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; }
    .kpi__label { font-size: .73rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .kpi__value { font-size: 1.9rem; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .kpi__sub { font-size: .75rem; color: var(--text-muted); }
    .kpi--danger .kpi__value { color: var(--danger); }
    .kpi--success .kpi__value { color: var(--success); }
    .kpi--warn .kpi__value { color: var(--warn); }
    .kpi--accent .kpi__value { color: var(--accent); }
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 22px; }
    .chart-card { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
    .chart-card__title { font-size: .87rem; font-weight: 600; margin-bottom: 14px; }
    .chart-wrap { position: relative; max-height: 260px; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 22px; background: var(--navy-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px; width: fit-content; }
    .tab-btn { padding: 7px 18px; border: none; background: transparent; color: var(--text-muted); font-size: .83rem; font-weight: 500; border-radius: var(--r-xs); cursor: pointer; transition: background var(--t), color var(--t); }
    .tab-btn:hover { color: var(--text); }
    .tab-btn--active { background: var(--navy-1); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .tab-panel { display: none; }
    .tab-panel--active { display: block; }
    .data-table-wrap { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .data-table th { padding: 10px 14px; text-align: left; font-size: .72rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-dim); background: var(--navy-2); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--navy-3); }
    .data-table__empty { padding: 32px; text-align: center; color: var(--text-dim); }
    .pri { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: .72rem; font-weight: 700; }
    .pri--p1 { background: rgba(220,38,38,.1); color: #dc2626; }
    .pri--p2 { background: rgba(234,88,12,.1); color: #ea580c; }
    .pri--p3 { background: rgba(180,83,9,.1); color: #b45309; }
    .pri--p4, .pri--p5 { background: rgba(100,116,139,.1); color: #64748b; }
    .heatmap { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; margin-bottom: 6px; }
    .heatmap__cell { height: 28px; border-radius: 3px; cursor: default; }
    .heatmap__labels { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; }
    .heatmap__labels span { font-size: .6rem; text-align: center; color: var(--text-dim); }
    @media (max-width: 768px) { .subnav { padding: 0 20px; } .content { padding: 20px; } .chart-grid { grid-template-columns: 1fr; } }
    /* Genuine Alerts tables — full width, resizable columns + copy-on-hover message cells */
    .genuine-table { width: 100%; table-layout: fixed; }
    .genuine-table th { resize: horizontal; overflow: auto; min-width: 60px; }
    /* Message col (1st) takes remaining space; Source/Priority/Team fixed */
    .genuine-table th:nth-child(2), .genuine-table td:nth-child(2) { width: 120px; }
    .genuine-table th:nth-child(3), .genuine-table td:nth-child(3) { width: 90px; }
    .genuine-table th:nth-child(4), .genuine-table td:nth-child(4) { width: 160px; }
    .genuine-table th:first-child, .genuine-table td.msg-cell { width: auto; max-width: none; }
    .genuine-table td.msg-cell { position: relative; white-space: normal; overflow: visible; word-break: break-word; }
    .genuine-table td.msg-cell .msg-text { display: inline-block; white-space: normal; overflow: visible; word-break: break-word; max-width: 100%; vertical-align: middle; }
    .genuine-table td.msg-cell .msg-copy { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); display: none; cursor: pointer; border: none; background: var(--bg, #fff); padding: 0 4px; font-size: .85rem; line-height: 1; border-radius: 4px; box-shadow: 0 0 4px rgba(0,0,0,.15); }
    .genuine-table td.msg-cell:hover .msg-copy { display: inline-block; }
    /* Noise Analysis tables — same resizable columns + copy-on-hover message cells as Genuine */
    .noise-table th { resize: horizontal; overflow: auto; min-width: 60px; }
    .noise-table td.msg-cell { position: relative; white-space: normal; overflow: visible; word-break: break-word; max-width: none; }
    .noise-table td.msg-cell .msg-text { display: inline-block; white-space: normal; overflow: visible; word-break: break-word; max-width: 100%; vertical-align: middle; }
    .noise-table td.msg-cell .msg-copy { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); display: none; cursor: pointer; border: none; background: var(--bg, #fff); padding: 0 4px; font-size: .85rem; line-height: 1; border-radius: 4px; box-shadow: 0 0 4px rgba(0,0,0,.15); }
    .noise-table td.msg-cell:hover .msg-copy { display: inline-block; }
  </style>
</head>
<body>

  <script>
    if (!window._isPortalEnv) {
      document.addEventListener('DOMContentLoaded', function() {
        var topbar = document.querySelector('.topbar');
        if (topbar) topbar.style.display = 'none';
        var lbl = document.getElementById('agent-label');
        if (lbl) lbl.style.display = 'inline';
      });
    }
  </script>
  <header class="topbar">
    <a href="/" class="topbar__brand">
      <span style="font-size:1.1rem;
      font-weight:700;color:#ffffff;
      letter-spacing:1px;
      font-family:inherit;">OPERATIVE</span>
    </a>
    <nav class="topbar__nav">
      <a href="/" class="topbar__link">Agents</a>
      <a href="/admin/" class="topbar__link">Admin</a>
    </nav>
    <div class="topbar__right" style="font-size:.85rem;color:var(--text-muted)">Alert Analyser</div>
  </header>

  <nav class="subnav">
    <span id="agent-label" style="display:none;position:absolute;right:1.5rem;font-size:.8rem;font-weight:600;color:var(--accent,#0891b2)">Alert Analyser</span>
    <a href="/chat?agent=alert-analyser" data-standalone-href="chat.html" class="subnav__link">💬 Chat</a>
    <a href="/agents/alert-analyser/dashboard" data-standalone-href="dashboard.html" class="subnav__link subnav__link--active">📊 Dashboard</a>
    <a href="/agents/alert-analyser/reports" data-standalone-href="reports.html" class="subnav__link">📁 Reports</a>
    <a href="/agents/alert-analyser/settings" data-standalone-href="settings.html" class="subnav__link">⚙ Settings</a>
  </nav>

  <div class="content">
    <div class="page-heading">
      <div>
        <div class="page-heading__title">Alert Dashboard</div>
        <div class="page-heading__sub">OpsGenie alert noise detection and signal analysis</div>
      </div>
      <button class="btn btn--primary" id="genBtn" onclick="generateAndLoad()" style="display:none">⚡ Generate Sample Data</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn tab-btn--active" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab-btn" onclick="switchTab('noise',this)">Noise Analysis</button>
      <button class="tab-btn" onclick="switchTab('genuine',this)">Genuine Alerts</button>
      <button class="tab-btn" onclick="switchTab('trends',this)">Trends</button>
      <button class="tab-btn" onclick="switchTab('insights',this)">AI Insights</button>
    </div>

    <div id="tab-overview" class="tab-panel tab-panel--active"></div>
    <div id="tab-noise"    class="tab-panel"></div>
    <div id="tab-genuine"  class="tab-panel"></div>
    <div id="tab-trends"   class="tab-panel"></div>
    <div id="tab-insights" class="tab-panel"></div>
  </div>

  <script>
    // ── Standalone mode: stub portal dependencies ─────────────────────────
    // In portal mode these are provided by config.js and portal.js.
    // In standalone mode we define safe fallbacks so the page works without them.
    const _isPortalMode = (typeof window._isPortalEnv !== 'undefined' && window._isPortalEnv === true);
    if (!_isPortalMode) {
      window.BACKEND_URL = '';
      window._authHeaders = () => ({});
      window.portalReady = Promise.resolve();
      window.showToast = (msg, type) => console.log('[toast]', type || 'info', msg);
    }
  </script>
  <script>
    // ── _isPortalMode already declared above ──
  </script>
  <script>
    const SLUG  = 'alert-analyser';
    const PROXY = _isPortalMode ? `${BACKEND_URL}/api/agents/${SLUG}/proxy` : '';
    const charts = {};
    let stats = null;

    async function api(path, opts = {}) {
      const res = await fetch(`${PROXY}${path}`, {
        ...opts,
        headers: { ..._authHeaders(), ...opts.headers },
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(e.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('tab-panel--active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-btn--active'));
      document.getElementById('tab-' + name).classList.add('tab-panel--active');
      btn.classList.add('tab-btn--active');
      if (name === 'insights') renderInsights();
    }

    async function generateAndLoad() {
      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Generating…';
      try {
        await api('/reports/generate-sample', { method: 'POST' });
        showToast('Generated 200 synthetic alerts', 'success');
        await loadDashboard();
      } catch (e) {
        showToast('Generation failed: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '⚡ Generate Sample Data';
      }
    }

    async function loadDashboard() {
      await portalReady;
      ['overview','noise','genuine','trends'].forEach(t =>
        document.getElementById('tab-' + t).innerHTML = skeletonHTML());
      try {
        const [data, cfg] = await Promise.all([api('/dashboard'), api('/settings').catch(() => ({}))]);
        const sourceType = cfg.source_type || 'synthetic';
        const genBtn = document.getElementById('genBtn');
        if (genBtn) genBtn.style.display = sourceType === 'synthetic' ? '' : 'none';
        if (data.empty) {
          ['overview','noise','genuine','trends'].forEach(t =>
            document.getElementById('tab-' + t).innerHTML = emptyState('🚨','No alert data loaded',
              `Click "Generate Sample Data" or upload alerts on the <a href="${_isPortalMode ? '/agents/alert-analyser/reports' : 'reports.html'}">Reports page</a>.`));
          return;
        }
        stats = data.stats;
        renderOverview();
        renderNoise();
        renderGenuine();
        renderTrends();
      } catch (e) {
        showToast('Failed to load dashboard: ' + e.message, 'error');
      }
    }

    function skeletonHTML() {
      return `<div style="display:flex;flex-direction:column;gap:12px;padding:4px 0">
        ${[80,60,90,70].map(w=>`<div class="skeleton" style="height:14px;width:${w}%"></div>`).join('')}
      </div>`;
    }
    function emptyState(icon, title, sub) {
      return `<div class="empty-state"><div class="empty-state__icon">${icon}</div>
        <div class="empty-state__title">${title}</div>
        <div class="empty-state__sub">${sub}</div></div>`;
    }
    function priClass(p) { return `pri pri--${(p||'p5').toLowerCase()}`; }
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text);
      } else {
        const el = document.createElement('textarea');
        el.value = text;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.focus();
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
      }
    }
    function copyMsgCell(btn) {
      const txt = btn.parentElement.querySelector('.msg-text')?.textContent || '';
      copyToClipboard(txt);
      const orig = btn.textContent;
      btn.textContent = '✅';
      btn.title = 'Copied!';
      setTimeout(() => { btn.textContent = orig; btn.title = 'Copy message'; }, 1000);
    }

    // ── Data Quality Insights (Overview tab) ──
    function dqRec(text) {
      return text
        ? `<div style="margin-top:12px;padding:10px 12px;background:rgba(245,158,11,.08);border-left:3px solid var(--warn);border-radius:4px;font-size:.78rem;color:var(--text-muted);line-height:1.5">${text}</div>`
        : '';
    }
    function dqRow(label, value, color) {
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.83rem">
        <span style="color:var(--text-muted)">${label}</span>
        <span style="font-weight:700${color ? ';color:' + color : ''}">${value}</span></div>`;
    }
    function renderDataQuality(dq) {
      const lc = dq.lifecycle, pr = dq.priority, ack = dq.acknowledgement;
      const srcRows = (dq.sources || []).map(s => `<tr${s.flagged ? ' style="background:rgba(220,38,38,.06)"' : ''}>
          <td>${s.source}</td><td>${s.auto_resolve_rate}%</td><td>${s.avg_close_mins}m</td>
          <td style="${s.flagged ? 'color:var(--danger);font-weight:700' : ''}">${s.never_close_rate}%</td></tr>`
        ).join('') || '<tr><td colspan="4" class="data-table__empty">No source data</td></tr>';
      const prRows = pr.distribution.map(p => {
        const flag = p.priority === 'P5' && pr.flagged;
        return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.8rem">
          <span style="width:24px;color:var(--text-muted)">${p.priority}</span>
          <div style="flex:1;height:8px;background:var(--navy-3);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${p.pct}%;background:${flag ? 'var(--danger)' : 'var(--accent)'}"></div></div>
          <span style="width:46px;text-align:right;font-weight:600${flag ? ';color:var(--danger)' : ''}">${p.pct}%</span></div>`;
      }).join('');
      return `
        <div class="chart-card__title" style="font-size:1rem;margin:6px 0 14px">Data Quality Insights</div>
        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-card__title">Alert Lifecycle Health</div>
            ${dqRow('Never closed', lc.never_closed_pct + '%', lc.never_closed_pct > 50 ? 'var(--warn)' : '')}
            ${dqRow('Proper open/close cycle', lc.proper_cycle_pct + '%')}
            ${dqRow('Acknowledged', lc.acknowledged_pct + '%')}
            ${dqRow('Unacknowledged', lc.unacknowledged_pct + '%')}
            ${dqRec(lc.recommendation)}
          </div>
          <div class="chart-card">
            <div class="chart-card__title">Source Health</div>
            <table class="data-table" style="font-size:.8rem">
              <thead><tr><th>Source</th><th>Auto-resolve</th><th>Avg close</th><th>Never-close</th></tr></thead>
              <tbody>${srcRows}</tbody></table>
            ${dqRec(dq.source_recommendation)}
          </div>
          <div class="chart-card">
            <div class="chart-card__title">Priority Distribution</div>
            ${prRows}
            ${dqRec(pr.recommendation)}
          </div>
          <div class="chart-card">
            <div class="chart-card__title">Acknowledgement Rate</div>
            ${dqRow('Acknowledged', ack.acknowledged_pct + '%', 'var(--success)')}
            ${dqRow('Never acknowledged', ack.never_acked_pct + '%', ack.never_acked_pct > 30 ? 'var(--danger)' : '')}
            <div style="margin-top:6px;font-size:.72rem;color:var(--text-dim)">Within-15-min timing requires acknowledgement timestamps, not tracked in current alert data.</div>
            ${dqRec(ack.recommendation)}
          </div>
        </div>`;
    }
    // Collapse OpsGenie team values (e.g. "{'type':'team','id':'9a64f39e-...'}") to "Team-XXXXXXXX".
    function cleanTeam(t) {
      if (t == null) return 'Unknown';
      const s = String(t).trim();
      if (!s || s.toLowerCase() === 'unknown') return 'Unknown';
      const m = s.match(/([0-9a-fA-F]{8})-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
      return m ? `Team-${m[1]}` : s;
    }
    function destroyChart(k) { if (charts[k]) { charts[k].destroy(); delete charts[k]; } }

    function renderOverview() {
      const s = stats;
      const suspectCount = s.suspect_count || 0;
      const noisePct = s.total ? Math.round(s.noise_count / s.total * 1000) / 10 : 0;
      const suspectPct = s.total ? Math.round(suspectCount / s.total * 1000) / 10 : 0;
      const totalNoisePct = s.noise_ratio != null ? s.noise_ratio : noisePct + suspectPct;
      document.getElementById('tab-overview').innerHTML = `
        <div class="kpi-grid">
          <div class="kpi kpi--accent"><div class="kpi__label">Total Alerts</div><div class="kpi__value">${s.total.toLocaleString()}</div><div class="kpi__sub">in dataset</div></div>
          <div class="kpi kpi--danger"><div class="kpi__label">Noise</div><div class="kpi__value">${s.noise_count}</div><div class="kpi__sub">${noisePct}% noise + ${suspectPct}% suspect = ${totalNoisePct}% total</div></div>
          <div class="kpi kpi--warn"><div class="kpi__label">Noise Suspect</div><div class="kpi__value" id="kpiSuspect">${suspectCount.toLocaleString()}</div><div class="kpi__sub">needs human review</div></div>
          <div class="kpi kpi--success"><div class="kpi__label">Genuine</div><div class="kpi__value">${s.genuine_count}</div><div class="kpi__sub">require attention</div></div>
          <div class="kpi kpi--warn"><div class="kpi__label">MTTR</div><div class="kpi__value">${s.mttr_minutes}m</div><div class="kpi__sub">mean time to resolve</div></div>
        </div>
        <div class="chart-grid">
          <div class="chart-card"><div class="chart-card__title">Genuine vs Noise</div><div class="chart-wrap"><canvas id="donutChart"></canvas></div></div>
          <div class="chart-card"><div class="chart-card__title">Alert Volume by Day</div><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>
        </div>
        ${s.data_quality ? renderDataQuality(s.data_quality) : ''}`;
      setTimeout(() => {
        destroyChart('donut');
        const c = document.getElementById('donutChart')?.getContext('2d');
        if (c) charts['donut'] = new Chart(c, { type:'doughnut', data:{ labels:['Genuine','Noise'], datasets:[{ data:[s.genuine_count,s.noise_count], backgroundColor:['#16a34a','#dc2626'], borderWidth:0 }] }, options:{ responsive:true, cutout:'65%', plugins:{legend:{position:'bottom'}} } });
        destroyChart('trend');
        const t = document.getElementById('trendChart')?.getContext('2d');
        if (t && s.daily_trend.length) charts['trend'] = new Chart(t, { type:'line', data:{ labels:s.daily_trend.map(d=>d.date), datasets:[
          { label:'Genuine',       data:s.daily_trend.map(d=>d.genuine),     borderColor:'#16a34a', backgroundColor:'rgba(22,163,74,.1)', fill:true, tension:.4 },
          { label:'Noise',         data:s.daily_trend.map(d=>d.noise),       borderColor:'#dc2626', backgroundColor:'rgba(220,38,38,.1)',  fill:true, tension:.4 },
          { label:'Noise Suspect', data:s.daily_trend.map(d=>d.suspect||0),  borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.1)', fill:true, tension:.4 },
        ] }, options:{ responsive:true, plugins:{legend:{position:'bottom'}} } });
      }, 50);
    }

    function renderNoise() {
      const s = stats;
      document.getElementById('tab-noise').innerHTML = `
        <div class="chart-grid">
          <div class="chart-card"><div class="chart-card__title">Top Noisy Sources</div><div class="chart-wrap"><canvas id="srcChart"></canvas></div></div>
          <div class="chart-card"><div class="chart-card__title">Noise Score by Service</div><div class="chart-wrap"><canvas id="scoreChart"></canvas></div></div>
        </div>
        <div class="data-table-wrap"><table class="data-table noise-table">
          <thead><tr><th>Alert Alias</th><th>Fire Count</th></tr></thead>
          <tbody>${s.repeat_offenders.map(r=>`<tr><td class="msg-cell"><span class="msg-text"><code>${r.alias}</code></span><button class="msg-copy" title="Copy" onclick="copyMsgCell(this)">📋</button></td><td>${r.count}</td></tr>`).join('') || '<tr><td colspan="2" class="data-table__empty">No repeat offenders</td></tr>'}</tbody>
        </table></div>
        <div class="data-table-wrap" style="margin-top:16px"><table class="data-table noise-table">
          <caption style="text-align:left;padding:14px 14px 0;font-size:.87rem;font-weight:600">Suppression Recommendations</caption>
          <thead><tr><th>Alert</th><th>Occurrences</th><th>Action</th></tr></thead>
          <tbody>${s.suppression_recommendations.length
            ? s.suppression_recommendations.map(r=>`<tr><td class="msg-cell"><span class="msg-text"><code>${r.alias}</code></span><button class="msg-copy" title="Copy" onclick="copyMsgCell(this)">📋</button></td><td>${r.count}</td><td><span class="badge badge--deprecated">Suppress</span></td></tr>`).join('')
            : '<tr><td colspan="3" class="data-table__empty">No strong suppression candidates</td></tr>'
          }</tbody>
        </table></div>`;
      setTimeout(() => {
        destroyChart('src');
        const c = document.getElementById('srcChart')?.getContext('2d');
        if (c) charts['src'] = new Chart(c, { type:'bar', data:{ labels:s.top_noisy_sources.map(x=>x.source), datasets:[{label:'Noise Count',data:s.top_noisy_sources.map(x=>x.count),backgroundColor:'#dc2626'}] }, options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}}} });
        destroyChart('score');
        const sc = document.getElementById('scoreChart')?.getContext('2d');
        const sorted = [...s.service_noise_scores].sort((a,b)=>b.score-a.score).slice(0,10);
        if (sc) charts['score'] = new Chart(sc, { type:'bar', data:{ labels:sorted.map(x=>x.service), datasets:[{label:'Noise %',data:sorted.map(x=>x.score),backgroundColor:'#6366f1'}] }, options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{max:100}}} });
      }, 50);
    }

    function renderGenuine() {
      const s = stats;
      document.getElementById('tab-genuine').innerHTML = `
        <div class="kpi-grid">
          <div class="kpi kpi--success"><div class="kpi__label">Total Genuine</div><div class="kpi__value">${s.genuine_count}</div><div class="kpi__sub">real incidents</div></div>
          <div class="kpi kpi--danger"><div class="kpi__label">Open Alerts</div><div class="kpi__value">${s.unresolved_count || s.unresolved_genuine.length}</div><div class="kpi__sub">showing top 50 of ${s.unresolved_count || s.unresolved_genuine.length} total${(s.unresolved_count || 0) > 500 ? ' · ⚠️ High open alert count — review OpsGenie closure policy' : ''}</div></div>
          <div class="kpi kpi--warn"><div class="kpi__label">P1/P2</div><div class="kpi__value">${s.high_severity_count ?? s.high_severity_genuine.length}</div><div class="kpi__sub">showing top 50 of ${s.high_severity_count ?? s.high_severity_genuine.length} total · high severity</div></div>
        </div>
        <div class="chart-card" style="margin-top:16px"><div class="chart-card__title">Team Alert Breakdown</div><div class="chart-wrap"><canvas id="teamChart"></canvas></div></div>
        <div class="data-table-wrap" style="margin-top:16px"><table class="data-table genuine-table" style="table-layout:auto">
          <caption style="text-align:left;padding:14px 14px 0;font-size:.87rem;font-weight:600">High Severity Genuine Alerts</caption>
          <thead><tr><th>Message</th><th>Source</th><th>Priority</th></tr></thead>
          <tbody>${s.high_severity_genuine.map(a=>`<tr><td class="msg-cell" style="white-space:normal;overflow:visible;word-break:break-word;max-width:none"><span class="msg-text" style="white-space:normal;overflow:visible;word-break:break-word">${a.message}</span><button class="msg-copy" title="Copy message" onclick="copyMsgCell(this)">📋</button></td><td>${a.source}</td><td><span class="${priClass(a.priority)}">${a.priority}</span></td></tr>`).join('') || '<tr><td colspan="3" class="data-table__empty">None</td></tr>'}</tbody>
        </table></div>
        <div class="data-table-wrap" style="margin-top:16px"><table class="data-table genuine-table" style="table-layout:auto">
          <caption style="text-align:left;padding:14px 14px 0;font-size:.87rem;font-weight:600">Unresolved Genuine Alerts</caption>
          <thead><tr><th style="max-width:none;width:100%">Message</th><th>Source</th><th>Priority</th><th>Team</th></tr></thead>
          <tbody>${s.unresolved_genuine.map(a=>`<tr><td class="msg-cell" style="white-space:normal;overflow:visible;word-break:break-word"><span class="msg-text" style="white-space:normal;overflow:visible;word-break:break-word">${a.message}</span><button class="msg-copy" title="Copy message" onclick="copyMsgCell(this)">📋</button></td><td>${a.source}</td><td><span class="${priClass(a.priority)}">${a.priority}</span></td><td>${cleanTeam((a.teams||['—'])[0])}</td></tr>`).join('') || '<tr><td colspan="4" class="data-table__empty">All genuine alerts resolved</td></tr>'}</tbody>
        </table></div>`;
      setTimeout(() => {
        destroyChart('team');
        const c = document.getElementById('teamChart')?.getContext('2d');
        if (c && s.team_breakdown.length) charts['team'] = new Chart(c, { type:'bar', data:{ labels:s.team_breakdown.map(t=>cleanTeam(t.team)), datasets:[
          {label:'Genuine',data:s.team_breakdown.map(t=>t.genuine),backgroundColor:'#16a34a'},
          {label:'Suspect',data:s.team_breakdown.map(t=>t.suspect||0),backgroundColor:'#f59e0b'},
          {label:'Noise',  data:s.team_breakdown.map(t=>t.noise),  backgroundColor:'#dc2626'},
        ] }, options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true}}} });
      }, 50);
    }

    function renderTrends() {
      const s = stats;
      const hourly = s.hourly_distribution;
      const maxH = Math.max(...hourly.map(h=>h.count), 1);
      document.getElementById('tab-trends').innerHTML = `
        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-card__title">Alert Volume by Hour</div>
            <div class="heatmap" id="heatmapGrid"></div>
            <div class="heatmap__labels">${hourly.map(h=>`<span>${h.hour}</span>`).join('')}</div>
          </div>
          <div class="chart-card"><div class="chart-card__title">Peak Alert Hours</div><div class="chart-wrap"><canvas id="hourChart"></canvas></div></div>
        </div>
        <div class="chart-card"><div class="chart-card__title">Daily Alert Classification</div><div class="chart-wrap"><canvas id="classChart"></canvas></div></div>
        <div class="chart-card" style="margin-top:16px"><div class="chart-card__title">Hourly Alert Distribution</div><div class="chart-wrap"><canvas id="hourDistChart"></canvas></div></div>`;
      const grid = document.getElementById('heatmapGrid');
      hourly.forEach(h => {
        const cell = document.createElement('div');
        cell.className = 'heatmap__cell';
        const i = h.count / maxH;
        cell.style.background = i < 0.05 ? 'var(--navy-3)' : `rgba(220,38,38,${0.15 + i * 0.85})`;
        cell.title = `${h.hour}:00 — ${h.count} alerts`;
        grid.appendChild(cell);
      });
      setTimeout(() => {
        // FIX 4 — single indigo palette, top-3 peak hours highlighted red
        destroyChart('hour');
        const c = document.getElementById('hourChart')?.getContext('2d');
        const topHours = new Set([...hourly].sort((a,b)=>b.count-a.count).slice(0,3).map(h=>h.hour));
        if (c) charts['hour'] = new Chart(c, { type:'bar', data:{ labels:hourly.map(h=>`${h.hour}:00`), datasets:[{label:'Alerts',data:hourly.map(h=>h.count),backgroundColor:hourly.map(h=>topHours.has(h.hour)?'#dc2626':'#6366f1')}] }, options:{responsive:true,plugins:{legend:{display:false}}} });
        // FIX 3 — daily classification stacked bar (replaces Signal Quality line)
        destroyChart('class');
        const cc = document.getElementById('classChart')?.getContext('2d');
        if (cc && s.daily_trend.length) charts['class'] = new Chart(cc, { type:'bar', data:{ labels:s.daily_trend.map(d=>d.date), datasets:[
          {label:'Genuine',       data:s.daily_trend.map(d=>d.genuine||0), backgroundColor:'#16a34a'},
          {label:'Noise Suspect', data:s.daily_trend.map(d=>d.suspect||0), backgroundColor:'#f59e0b'},
          {label:'Noise',         data:s.daily_trend.map(d=>d.noise||0),   backgroundColor:'#dc2626'},
        ] }, options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true}}} });
        // FIX 3 — hourly distribution bar with peak-hour annotation
        destroyChart('hourdist');
        const hd = document.getElementById('hourDistChart')?.getContext('2d');
        if (hd && hourly.length) {
          const peak = hourly.reduce((m,h)=>h.count>m.count?h:m, hourly[0]);
          charts['hourdist'] = new Chart(hd, { type:'bar', data:{ labels:hourly.map(h=>`${h.hour}:00`), datasets:[{label:'Alerts',data:hourly.map(h=>h.count),backgroundColor:hourly.map(h=>h.hour===peak.hour?'#dc2626':'#6366f1')}] }, options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:`Peak: ${peak.hour}:00 (${peak.count} alerts)`}}} });
        }
      }, 50);
    }

    // ── AI Insights ──────────────────────────────────────────────────────────
    let _insightsCache = null;
    let _insightsCacheTs = null;

    function renderInsights() {
      const el = document.getElementById('tab-insights');
      if (!stats) {
        el.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text-muted)"><div style="font-size:2rem;margin-bottom:8px">🤖</div><div style="font-weight:600;margin-bottom:4px">No alert data loaded</div><div style="font-size:.85rem">Run a sync first, then return here.</div></div>';
        return;
      }
      el.innerHTML = `
        <div class="panel-card" style="border-color:var(--accent)">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
            <div class="section-title" style="margin:0;color:var(--accent)">🤖 AI Alert Insights</div>
            <button class="btn btn--primary" id="genInsightsBtn" onclick="generateInsights()">⚡ Generate Insights</button>
          </div>
          <div id="insightsTs" style="font-size:.78rem;color:var(--text-muted);margin-bottom:10px;display:none"></div>
          <div id="insightsBody" style="font-size:.88rem;line-height:1.7;color:var(--text-muted)">
            Click <strong>Generate Insights</strong> to have Claude analyse your alert data and produce an executive summary, noise breakdown, team patterns, and recommended actions.
          </div>
        </div>`;
      if (_insightsCache) {
        document.getElementById('insightsBody').innerHTML = _insightsCache;
        const tsEl = document.getElementById('insightsTs');
        tsEl.style.display = 'block';
        tsEl.textContent = 'Last generated: ' + _insightsCacheTs;
        const btn = document.getElementById('genInsightsBtn');
        btn.textContent = '🔄 Regenerate Insights';
        btn.onclick = () => generateInsights(true);
      }
    }

    function buildInsightsPrompt() {
      const s = stats;
      const payload = {
        total_alerts: s.total_alerts,
        genuine_count: s.genuine_count,
        noise_count: s.noise_count,
        suspect_count: s.suspect_count,
        noise_ratio_pct: s.noise_ratio ? (s.noise_ratio * 100).toFixed(1) : null,
        top_noise_sources: (s.top_noise_sources || []).slice(0, 10),
        top_genuine_sources: (s.top_genuine_sources || []).slice(0, 10),
        team_breakdown: s.team_breakdown || [],
        priority_breakdown: s.priority_breakdown || {},
        suppression_recommendations: (s.suppression_recommendations || []).slice(0, 5),
        repeat_offenders: (s.repeat_offenders || []).slice(0, 5),
      };
      return `You are a senior SRE. Analyse this alert intelligence data and produce a markdown report with these sections:\n\n## Executive Summary\n3-4 sentences on alert volume, noise ratio, and headline concerns.\n\n## Top Noise Sources\nWorst offenders driving noise with recommended tuning actions.\n\n## Team Alert Patterns\nWhich teams have highest genuine burden vs noise.\n\n## Recommended Actions\nNumbered list of 3-5 concrete actions for this week.\n\nData:\n\`\`\`json\n${JSON.stringify(payload, null, 2)}\n\`\`\``;
    }

    async function generateInsights(force = false) {
      const btn = document.getElementById('genInsightsBtn');
      const body = document.getElementById('insightsBody');
      const tsEl = document.getElementById('insightsTs');
      if (!force && _insightsCache) { body.innerHTML = _insightsCache; return; }
      btn.disabled = true;
      btn.textContent = '⏳ Generating...';
      body.innerHTML = '';
      const msgs = ['Analysing alert patterns...','Reviewing noise sources...','Evaluating team workload...','Preparing recommendations...'];
      let mi = 0;
      const pel = document.createElement('div');
      pel.style.cssText = 'color:var(--text-muted);font-style:italic;padding:12px 0;';
      pel.textContent = msgs[0];
      body.appendChild(pel);
      const pi = setInterval(() => { mi = (mi+1)%msgs.length; pel.textContent = msgs[mi]; }, 2000);
      let firstToken = false, fullText = '';
      let sseBuffer = '';
      let done_reading = false;
      let stopReason = 'end_turn';
      try {
        const sid = (typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r=Math.random()*16|0; return (c=='x'?r:(r&0x3|0x8)).toString(16); }));
        const response = await fetch(`${PROXY}/invoke/stream-insights`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ..._authHeaders() },
          body: JSON.stringify({ session_id: sid, user_message: buildInsightsPrompt(), history: [], context: {} }),
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done || done_reading) break;
          sseBuffer += decoder.decode(value, { stream: true });
          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trimEnd();
            if (data.startsWith('[STOP_REASON]')) { stopReason = data.slice(14).trim(); continue; }
            if (data === '[DONE]') { done_reading = true; break; }
            if (data.startsWith('[ERROR]')) throw new Error(data.slice(7).trim());
            if (!firstToken) { firstToken = true; clearInterval(pi); body.innerHTML = ''; }
            fullText += data.replace(/\\n/g, '\n');
            body.innerHTML = marked.parse(fullText);
          }
        }
        _insightsCache = body.innerHTML;
        _insightsCacheTs = new Date().toLocaleString();
        tsEl.style.display = 'block';
        tsEl.textContent = 'Last generated: ' + _insightsCacheTs;
        btn.textContent = '🔄 Regenerate Insights';
        btn.disabled = false;
        btn.onclick = () => generateInsights(true);

        // If the model hit the token cap, offer to continue
        if (stopReason === 'max_tokens') {
          const continueBtn = document.createElement('button');
          continueBtn.className = 'btn btn--primary';
          continueBtn.style.cssText = 'margin-top:8px';
          continueBtn.textContent = 'Continue Analysis ›';
          continueBtn.onclick = async () => {
            continueBtn.remove();
            btn.disabled = true;
            stopReason = 'end_turn';
            sseBuffer = '';
            done_reading = false;
            try {
              const contResp = await fetch(`${PROXY}/invoke/stream-insights`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ..._authHeaders() },
                body: JSON.stringify({ session_id: sid, user_message: buildInsightsPrompt(), history: [], context: { continuation_of: fullText } }),
              });
              if (!contResp.ok) throw new Error('HTTP ' + contResp.status);
              const contReader = contResp.body.getReader();
              const contDecoder = new TextDecoder();
              while (true) {
                const { done, value } = await contReader.read();
                if (done || done_reading) break;
                sseBuffer += contDecoder.decode(value, { stream: true });
                const lines = sseBuffer.split('\n');
                sseBuffer = lines.pop();
                for (const line of lines) {
                  if (!line.startsWith('data: ')) continue;
                  const data = line.slice(6).trimEnd();
                  if (data.startsWith('[STOP_REASON]')) { stopReason = data.slice(14).trim(); continue; }
                  if (data === '[DONE]') { done_reading = true; break; }
                  if (data.startsWith('[ERROR]')) { done_reading = true; break; }
                  fullText += data.replace(/\\n/g, '\n');
                  body.innerHTML = marked.parse(fullText);
                }
              }
              _insightsCache = body.innerHTML;
              btn.disabled = false;
              if (stopReason === 'max_tokens') btn.parentElement.appendChild(continueBtn);
            } catch(err) {
              clearInterval(pi);
              body.innerHTML += '<div style="color:var(--danger);margin-top:12px">Continuation failed: ' + (err.message || err) + '</div>';
              btn.disabled = false;
              btn.textContent = '⚡ Generate Insights';
            }
          };
          btn.parentElement.appendChild(continueBtn);
        }
      } catch(err) {
        clearInterval(pi);
        body.innerHTML = '<span style="color:var(--danger)">Failed: ' + err.message + '</span>';
        btn.disabled = false;
        btn.textContent = '⚡ Generate Insights';
      }
    }

    loadDashboard();
  </script>
  <script>
    // ── Fix nav links in standalone mode ──────────────────────────────────
    if (typeof _isPortalMode !== 'undefined' && !_isPortalMode) {
      document.querySelectorAll('[data-standalone-href]').forEach(el => {
        el.href = el.dataset.standaloneHref;
      });
    }
  </script>
</body>
</html>
